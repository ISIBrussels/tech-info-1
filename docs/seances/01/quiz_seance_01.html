<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz interactif - Seance 1</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        max-width: 860px;
        margin: 2rem auto;
        padding: 0 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.6;
      }
      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 1rem;
        margin-top: 1rem;
      }
      .answers {
        display: grid;
        gap: 0.6rem;
        margin: 1rem 0;
      }
      button {
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        border: 1px solid #8c959f;
        background: transparent;
        cursor: pointer;
      }
      .result {
        font-weight: 600;
      }
      .ok {
        color: #1a7f37;
      }
      .ko {
        color: #cf222e;
      }
      .muted {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <p><a href="../../index.html">← Retour a l'accueil</a> · <a href="cours_seance_01.html">Retour aux slides</a></p>
    <h1>Quiz interactif - Seance 1</h1>
    <p class="muted">Repondez a la question puis verifiez la reponse.</p>

    <section class="card">
      <h2>Question 1</h2>
      <p><strong>Quel operateur sert a affecter une valeur a une variable en Python ?</strong></p>
      <div class="answers">
        <label><input type="radio" name="q1" value="A" /> A. <code>==</code></label>
        <label><input type="radio" name="q1" value="B" /> B. <code>=</code></label>
        <label><input type="radio" name="q1" value="C" /> C. <code>:=</code></label>
        <label><input type="radio" name="q1" value="D" /> D. <code>!=</code></label>
      </div>
      <button id="check-btn" type="button">Verifier</button>
      <button id="reset-btn" type="button">Recommencer</button>
      <p id="result" class="result" aria-live="polite"></p>
    </section>

    <script>
      const checkBtn = document.getElementById("check-btn");
      const resetBtn = document.getElementById("reset-btn");
      const result = document.getElementById("result");
      const q1Key = "quiz_seance_01_q1";

      function getSelectedValue() {
        const selected = document.querySelector('input[name="q1"]:checked');
        return selected ? selected.value : null;
      }

      function renderSavedAnswer() {
        const saved = localStorage.getItem(q1Key);
        if (!saved) return;
        const input = document.querySelector(`input[name="q1"][value="${saved}"]`);
        if (input) input.checked = true;
      }

      checkBtn.addEventListener("click", () => {
        const answer = getSelectedValue();
        if (!answer) {
          result.textContent = "Selectionnez une reponse avant de verifier.";
          result.className = "result ko";
          return;
        }

        localStorage.setItem(q1Key, answer);
        if (answer === "B") {
          result.textContent = "Correct. L'operateur d'affectation est '='.";
          result.className = "result ok";
        } else {
          result.textContent = "Incorrect. La bonne reponse est B ('=').";
          result.className = "result ko";
        }
      });

      resetBtn.addEventListener("click", () => {
        const selected = document.querySelector('input[name="q1"]:checked');
        if (selected) selected.checked = false;
        localStorage.removeItem(q1Key);
        result.textContent = "";
        result.className = "result";
      });

      renderSavedAnswer();
    </script>
  </body>
</html>
