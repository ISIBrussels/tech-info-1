<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz interactif — Séance 1</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        max-width: 860px;
        margin: 2rem auto;
        padding: 0 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.6;
      }
      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 1rem;
        margin-top: 1rem;
      }
      .answers {
        display: grid;
        gap: 0.6rem;
        margin: 1rem 0;
      }
      button {
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        border: 1px solid #8c959f;
        background: transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }
      .progress {
        margin-top: 0.5rem;
        font-size: 0.95rem;
        opacity: 0.85;
      }
      .result {
        font-weight: 600;
        margin-top: 1rem;
      }
      .ok {
        color: #1a7f37;
      }
      .ko {
        color: #cf222e;
      }
      .muted {
        opacity: 0.85;
      }
      .question-feedback {
        margin-top: 0.75rem;
        font-size: 0.95rem;
      }
      .score-list {
        margin: 0.5rem 0 0;
        padding-left: 1.2rem;
      }
    </style>
  </head>
  <body>
    <p><a href="../../index.html">← Retour à l'accueil</a> · <a href="cours_seance_01.html">Retour aux slides</a></p>
    <h1>Quiz interactif — Séance 1</h1>
    <p class="muted">10 questions sur le contenu des slides.</p>

    <section class="card">
      <p class="progress" id="progress"></p>
      <div id="quiz"></div>
      <p class="question-feedback" id="feedback" aria-live="polite"></p>
    </section>

    <div class="actions">
      <button id="prev-btn" type="button">Précédent</button>
      <button id="next-btn" type="button">Suivant</button>
      <button id="check-btn" type="button" hidden>Vérifier tout</button>
      <button id="reset-btn" type="button">Recommencer</button>
    </div>
    <div id="summary" class="result" aria-live="polite"></div>

    <script>
      const storageKey = "quiz_seance_01_answers_v2";
      const indexKey = "quiz_seance_01_index_v2";

      const questions = [
        {
          id: "q1",
          text: "Quel opérateur sert à affecter une valeur à une variable en Python ?",
          options: [
            { value: "A", label: "<code>==</code>" },
            { value: "B", label: "<code>=</code>" },
            { value: "C", label: "<code>:=</code>" },
            { value: "D", label: "<code>!=</code>" },
          ],
          correct: "B",
          feedback: "L'opérateur d'affectation est <code>=</code>. <code>==</code> sert à comparer.",
        },
        {
          id: "q2",
          text: "Python est principalement considéré comme un langage…",
          options: [
            { value: "A", label: "compilé" },
            { value: "B", label: "interprété" },
            { value: "C", label: "assembleur" },
            { value: "D", label: "machine" },
          ],
          correct: "B",
          feedback: "Python est interprété : l'interpréteur lit et exécute les instructions à chaque lancement.",
        },
        {
          id: "q3",
          text: "En Python, une variable est surtout…",
          options: [
            { value: "A", label: "une boîte qui contient directement la valeur" },
            { value: "B", label: "un nom qui référence un objet en mémoire" },
            { value: "C", label: "un type déclaré explicitement avant usage" },
            { value: "D", label: "une fonction prédéfinie du langage" },
          ],
          correct: "B",
          feedback: "Une variable est une référence : un nom lié à un objet, pas une boîte contenant la valeur.",
        },
        {
          id: "q4",
          text: "Comment marque-t-on un commentaire sur une ligne en Python ?",
          options: [
            { value: "A", label: "avec <code>//</code>" },
            { value: "B", label: "avec <code>/* ... */</code>" },
            { value: "C", label: "avec <code>#</code>" },
            { value: "D", label: "avec <code>--</code>" },
          ],
          correct: "C",
          feedback: "Les commentaires Python commencent par <code>#</code> et sont ignorés à l'exécution.",
        },
        {
          id: "q5",
          text: "Quel est le type de la valeur <code>3.14</code> en Python ?",
          options: [
            { value: "A", label: "<code>int</code>" },
            { value: "B", label: "<code>float</code>" },
            { value: "C", label: "<code>bool</code>" },
            { value: "D", label: "<code>str</code>" },
          ],
          correct: "B",
          feedback: "<code>3.14</code> est un nombre à virgule flottante, donc de type <code>float</code>.",
        },
        {
          id: "q6",
          text: "Que renvoie l'expression <code>5 == 5</code> ?",
          options: [
            { value: "A", label: "le nombre <code>5</code>" },
            { value: "B", label: "le nombre <code>0</code>" },
            { value: "C", label: "<code>True</code>" },
            { value: "D", label: "la chaîne <code>\"5\"</code>" },
          ],
          correct: "C",
          feedback: "Une comparaison renvoie toujours un booléen. Ici, l'égalité est vraie : <code>True</code>.",
        },
        {
          id: "q7",
          text: "Quelle est la valeur de <code>True and False</code> ?",
          options: [
            { value: "A", label: "<code>True</code>" },
            { value: "B", label: "<code>False</code>" },
            { value: "C", label: "<code>None</code>" },
            { value: "D", label: "une erreur d'exécution" },
          ],
          correct: "B",
          feedback: "L'opérateur <code>and</code> n'est vrai que si les deux opérandes sont vrais.",
        },
        {
          id: "q8",
          text: "À quoi sert principalement le REPL Python ?",
          options: [
            { value: "A", label: "compiler le code en binaire avant exécution" },
            { value: "B", label: "exécuter des instructions en direct pour tester du code" },
            { value: "C", label: "créer automatiquement des fichiers <code>.py</code>" },
            { value: "D", label: "installer des bibliothèques externes" },
          ],
          correct: "B",
          feedback: "Le REPL permet de lancer <code>python</code> sans fichier et de tester des instructions immédiatement.",
        },
        {
          id: "q9",
          text: "Par rapport à un éditeur de code, un IDE ajoute surtout…",
          options: [
            { value: "A", label: "uniquement la coloration syntaxique" },
            { value: "B", label: "l'exécution et le débogage au même endroit" },
            { value: "C", label: "l'obligation de déclarer les types explicitement" },
            { value: "D", label: "la conversion automatique du code en C++" },
          ],
          correct: "B",
          feedback: "Un IDE regroupe édition, exécution et débogage ; l'éditeur de code sert surtout à écrire le script.",
        },
        {
          id: "q10",
          text: "Quelle syntaxe définit correctement une f-string en Python ?",
          options: [
            { value: "A", label: "<code>\"Bonjour {nom}\"</code>" },
            { value: "B", label: "<code>f\"Bonjour {nom}\"</code>" },
            { value: "C", label: "<code>str(\"Bonjour\", nom)</code>" },
            { value: "D", label: "<code>format(\"Bonjour {nom}\")</code>" },
          ],
          correct: "B",
          feedback: "Une f-string est préfixée par <code>f</code> ; les variables s'insèrent entre accolades.",
        },
      ];

      const quizEl = document.getElementById("quiz");
      const progressEl = document.getElementById("progress");
      const feedbackEl = document.getElementById("feedback");
      const summaryEl = document.getElementById("summary");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const checkBtn = document.getElementById("check-btn");
      const resetBtn = document.getElementById("reset-btn");

      let currentIndex = 0;
      let checked = false;
      const answers = {};

      function loadState() {
        const rawAnswers = localStorage.getItem(storageKey);
        const rawIndex = localStorage.getItem(indexKey);

        if (rawAnswers) {
          try {
            Object.assign(answers, JSON.parse(rawAnswers));
          } catch {
            localStorage.removeItem(storageKey);
          }
        }

        if (rawIndex !== null) {
          const index = Number(rawIndex);
          if (Number.isInteger(index) && index >= 0 && index < questions.length) {
            currentIndex = index;
          }
        }
      }

      function saveState() {
        localStorage.setItem(storageKey, JSON.stringify(answers));
        localStorage.setItem(indexKey, String(currentIndex));
      }

      function getCurrentQuestion() {
        return questions[currentIndex];
      }

      function renderQuestion() {
        const question = getCurrentQuestion();
        const selected = answers[question.id] || null;

        progressEl.textContent = `Question ${currentIndex + 1} / ${questions.length}`;
        quizEl.innerHTML = `
          <h2>Question ${currentIndex + 1}</h2>
          <p><strong>${question.text}</strong></p>
          <div class="answers">
            ${question.options
              .map(
                (option) => `
              <label>
                <input
                  type="radio"
                  name="${question.id}"
                  value="${option.value}"
                  ${selected === option.value ? "checked" : ""}
                />
                ${option.value}. ${option.label}
              </label>
            `
              )
              .join("")}
          </div>
        `;

        quizEl.querySelectorAll(`input[name="${question.id}"]`).forEach((input) => {
          input.addEventListener("change", () => {
            answers[question.id] = input.value;
            checked = false;
            feedbackEl.textContent = "";
            feedbackEl.className = "question-feedback";
            summaryEl.innerHTML = "";
            summaryEl.className = "result";
            saveState();
          });
        });

        prevBtn.disabled = currentIndex === 0;
        nextBtn.hidden = currentIndex === questions.length - 1;
        checkBtn.hidden = currentIndex !== questions.length - 1;

        if (checked && selected) {
          const isCorrect = selected === question.correct;
          feedbackEl.textContent = isCorrect
            ? `Correct. ${question.feedback}`
            : `Incorrect. ${question.feedback}`;
          feedbackEl.className = isCorrect ? "question-feedback ok" : "question-feedback ko";
        } else {
          feedbackEl.textContent = "";
          feedbackEl.className = "question-feedback";
        }
      }

      function renderSummary() {
        let score = 0;
        const items = questions.map((question, index) => {
          const answer = answers[question.id];
          const isCorrect = answer === question.correct;
          if (isCorrect) score += 1;
          const status = !answer ? "non répondue" : isCorrect ? "correcte" : "incorrecte";
          return `<li>Question ${index + 1} : ${status}</li>`;
        });

        summaryEl.innerHTML = `
          <p class="${score === questions.length ? "ok" : "ko"}">Score : ${score} / ${questions.length}</p>
          <ul class="score-list">${items.join("")}</ul>
        `;
        summaryEl.className = "result";
      }

      function checkAll() {
        const unanswered = questions.filter((question) => !answers[question.id]);
        if (unanswered.length > 0) {
          feedbackEl.textContent = `Il reste ${unanswered.length} question(s) sans réponse.`;
          feedbackEl.className = "question-feedback ko";
          return;
        }

        checked = true;
        saveState();
        renderQuestion();
        renderSummary();
      }

      function resetQuiz() {
        for (const key of Object.keys(answers)) {
          delete answers[key];
        }
        currentIndex = 0;
        checked = false;
        localStorage.removeItem(storageKey);
        localStorage.removeItem(indexKey);
        feedbackEl.textContent = "";
        feedbackEl.className = "question-feedback";
        summaryEl.innerHTML = "";
        summaryEl.className = "result";
        renderQuestion();
      }

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex -= 1;
          saveState();
          renderQuestion();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          saveState();
          renderQuestion();
        }
      });

      checkBtn.addEventListener("click", checkAll);
      resetBtn.addEventListener("click", resetQuiz);

      loadState();
      renderQuestion();
    </script>
  </body>
</html>
