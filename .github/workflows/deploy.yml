name: Build and Deploy Marp Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli marked

      - name: Build Marp slides
        run: |
          mkdir -p dist
          cp -r docs/* dist/

          for file in docs/seances/*/cours_seance_*.md; do
            if [ -f "$file" ]; then
              out="dist/${file#docs/}"
              out="${out%.md}.html"
              mkdir -p "$(dirname "$out")"
              marp "$file" --html -o "$out"
            fi
          done

      - name: Build exercise pages (Markdown to static HTML)
        run: |
          for file in docs/seances/*/exercices_seance_*.md; do
            if [ -f "$file" ]; then
              out="dist/${file#docs/}"
              out="${out%.md}.html"
              mkdir -p "$(dirname "$out")"

              body="$(marked "$file")"
              cat > "$out" <<EOF
          <!doctype html>
          <html lang="fr">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>$(basename "${file%.md}")</title>
              <style>
                body {
                  max-width: 860px;
                  margin: 2rem auto;
                  padding: 0 1rem;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                  line-height: 1.6;
                }
                pre {
                  background: #f6f8fa;
                  padding: 0.75rem;
                  overflow-x: auto;
                }
                code {
                  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                }
              </style>
            </head>
            <body>
          $body
            </body>
          </html>
          EOF
            fi
          done

      - name: Create pages index
        run: |
          {
            echo '<!doctype html>'
            echo '<html lang="fr">'
            echo '  <head>'
            echo '    <meta charset="utf-8" />'
            echo '    <meta name="viewport" content="width=device-width, initial-scale=1" />'
            echo '    <title>Tech Info 1 — Slides</title>'
            echo '  </head>'
            echo '  <body>'
            echo '    <h1>Tech Info 1 — Slides</h1>'
            echo '    <p>Accès direct aux slides Marp et aux exercices.</p>'
            echo '    <ul>'

            for slide in dist/seances/*/cours_seance_*.html; do
              [ -f "$slide" ] || continue
              folder="$(basename "$(dirname "$slide")")"
              n="${folder#0}"
              exo="seances/$folder/exercices_seance_$folder.html"
              echo "      <li>Séance $n — <a href=\"./seances/$folder/cours_seance_$folder.html\">Cours (slides)</a> · <a href=\"./$exo\">Exercices</a></li>"
            done

            echo '    </ul>'
            echo '  </body>'
            echo '</html>'
          } > dist/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
